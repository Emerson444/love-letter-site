<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Para Você 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #ffe6eb, #fff);
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="vh-100 d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="display-3 fw-bold">Para Você 💕</h1>
    <p class="lead">Esse site é só uma pequena parte do que eu sinto por você.</p>
    <a href="#fotos" class="btn btn-danger mt-3">Ver nossas memórias</a>
  </div>
</section>

<!-- CAROUSEL -->
<section id="fotos" class="py-5">
  <div class="container">

    <div id="carouselExampleFade" class="carousel slide carousel-fade mx-auto" style="max-width: 500px;">
      
      <div class="carousel-inner ratio ratio-1x1">

        <div class="carousel-item active h-100">
          <img src="foto1.jpg" class="d-block w-100 h-100 object-fit-cover" alt="">
        </div>

        <div class="carousel-item h-100">
          <img src="foto2.jpg" class="d-block w-100 h-100 object-fit-cover" alt="">
        </div>

        <div class="carousel-item h-100">
          <img src="foto3.jpg" class="d-block w-100 h-100 object-fit-cover" alt="">
        </div>

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

  </div>
</section>

<!-- CARTA -->
<section class="py-5 bg-white text-center">
  <div class="container">
    <h2 class="mb-4">Uma carta para você 💌</h2>
    <p class="fs-5">
      Desde que você entrou na minha vida, tudo ficou mais leve, mais bonito e mais colorido.
      Obrigado por cada sorriso, cada abraço e cada momento ao seu lado.
    </p>
  </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-4">
  <p class="mb-0">Feito com ❤️ por SeuNome</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
